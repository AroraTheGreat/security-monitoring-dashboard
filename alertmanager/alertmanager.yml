global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default-receiver'

  routes:
    - match:
        severity: critical
      receiver: 'default-receiver'
      group_wait: 5s

receivers:
  - name: 'default-receiver'
    # Alerts visible in Alertmanager UI at localhost:9093
    # To add email/Slack, add smtp_configs or slack_configs here